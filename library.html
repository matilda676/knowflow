<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>KnowFlow · 知识库</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{
    --bg:#fbf6f1;
    --bg-soft:#f3ece2;
    --card:#ffffff;
    --ink:#231815;
    --ink-soft:#6b5d57;
    --ink-faint:#a59a93;
    --line:#ece2d3;
    --line-soft:#f3ece2;
    --primary:#ff5a3c;
    --primary-soft:#ffe2d9;
    --primary-ink:#c8341a;
    --green:#3aa97a;
    --shadow:0 8px 30px rgba(60,30,20,.06);
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input{font-family:inherit;color:inherit}

  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
  .sidebar{
    background:linear-gradient(180deg,#fff 0%,#fff7f1 100%);
    border-right:1px solid var(--line);
    padding:24px 18px;position:sticky;top:0;height:100vh;
    display:flex;flex-direction:column;gap:18px;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:4px 6px}
  .brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#ff7a4d,#ff4d2e);display:grid;place-items:center;color:#fff;font-weight:700;box-shadow:0 6px 16px rgba(255,90,60,.35)}
  .brand .name{font-size:16px;font-weight:700;letter-spacing:.3px}
  .brand .tag{font-size:11px;color:var(--ink-faint)}

  .nav-section .label{font-size:11px;color:var(--ink-faint);padding:10px 8px 6px;letter-spacing:.5px}
  .nav-item{
    display:flex;align-items:center;gap:10px;
    padding:9px 10px;border-radius:10px;color:var(--ink-soft);
    font-size:13.5px;cursor:pointer;transition:.15s;
  }
  .nav-item:hover{background:var(--bg-soft);color:var(--ink)}
  .nav-item.active{background:linear-gradient(135deg,#fff1ec,#ffe2d9);color:var(--primary-ink);font-weight:600}
  .nav-item .icon{width:18px;height:18px;display:grid;place-items:center}
  .nav-item .badge{margin-left:auto;font-size:11px;background:#fff;border:1px solid var(--line);padding:2px 7px;border-radius:999px;color:var(--ink-soft)}

  .kb-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:auto}
  .kb-card .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .kb-card .row .k{font-size:12px;color:var(--ink-soft)}
  .kb-card .row .v{font-size:13px;font-weight:600}
  .kb-card .hint{font-size:11.5px;color:var(--ink-faint);margin-top:6px}

  /* 主体 */
  .main{padding:28px 36px 60px;max-width:1080px;width:100%}

  .page-head{margin-bottom:18px}
  .crumbs{font-size:12px;color:var(--ink-faint);margin-bottom:8px}
  .crumbs span{color:var(--ink-soft)}
  .title{font-size:24px;font-weight:700;letter-spacing:.3px}
  .subtitle{color:var(--ink-soft);font-size:13px;margin-top:6px}

  /* 概览卡 */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow)}
  .stat .label{font-size:12px;color:var(--ink-soft);margin-bottom:6px}
  .stat .value{font-size:22px;font-weight:700;letter-spacing:.5px}
  .stat .trend{font-size:11.5px;color:var(--green);margin-top:4px}

  /* 搜索 */
  .toolbar{
    background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:18px;
    display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);
  }
  .search{
    flex:1;display:flex;align-items:center;gap:8px;background:var(--bg-soft);
    border-radius:10px;padding:8px 12px;border:1.5px solid transparent;transition:.15s;
  }
  .search:focus-within{background:#fff;border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,90,60,.12)}
  .search input{background:transparent;border:none;outline:none;flex:1;font-size:13.5px}
  .search .ico{color:var(--ink-faint);font-size:14px}
  .search kbd{font-size:10.5px;background:#fff;border:1px solid var(--line);padding:2px 6px;border-radius:5px;color:var(--ink-faint)}

  .content{display:block}

  /* 列表 */
  .list-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .list-head .left{font-size:14px;font-weight:700}
  .list-head .left span{color:var(--ink-faint);font-weight:500;margin-left:6px;font-size:12.5px}

  .article{
    background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:12px;
    display:grid;grid-template-columns:1fr auto;gap:16px;cursor:pointer;transition:.15s;box-shadow:var(--shadow);
  }
  .article:hover{border-color:#ffc1ad;transform:translateY(-1px);box-shadow:0 12px 30px rgba(60,30,20,.08)}
  .article .body h4{font-size:14.5px;font-weight:700;margin-bottom:6px;line-height:1.5}
  .article .body .excerpt{font-size:12.5px;color:var(--ink-soft);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .article .body .meta{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:8px;font-size:11.5px;color:var(--ink-faint)}
  .article .body .meta .src{color:var(--ink-soft);font-weight:500}
  .article .body .meta .dot{width:3px;height:3px;background:var(--ink-faint);border-radius:50%}
  .article .body .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .article .body .tags .t{font-size:10.5px;background:var(--bg-soft);color:var(--ink-soft);padding:2px 7px;border-radius:5px}
  .article .body .tags .t.strong{background:var(--primary-soft);color:var(--primary-ink);font-weight:600}

  .article .right{display:flex;align-items:center;gap:6px}
  .article .right .op{width:28px;height:28px;border-radius:8px;background:var(--bg-soft);display:grid;place-items:center;color:var(--ink-soft);font-size:13px;cursor:pointer;transition:.15s}
  .article .right .op:hover{background:var(--primary-soft);color:var(--primary-ink)}

  @media (max-width:760px){
    html,body{font-size:14px}
    .app{display:block;min-height:100vh}
    .sidebar{
      position:static;height:auto;border-right:0;border-bottom:1px solid var(--line);
      padding:14px 12px;gap:10px;
    }
    .brand{padding:0 4px}
    .nav-section .label{display:none}
    .nav-section{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
    .nav-section::-webkit-scrollbar{display:none}
    .nav-item{flex:0 0 auto;padding:8px 10px;white-space:nowrap}
    .nav-item .badge{margin-left:6px}
    #sidebarCategories{display:flex;gap:8px}
    .kb-card{display:none}
    .main{max-width:none;padding:16px 12px 36px}
    .stats{grid-template-columns:1fr;gap:10px;margin-bottom:14px}
    .stat{padding:12px 14px}
    .toolbar{padding:10px;margin-bottom:14px}
    .search input{font-size:16px}
    .search kbd{display:none}
    .list-head{margin-bottom:10px}
    .article{grid-template-columns:1fr;gap:10px;padding:14px;margin-bottom:10px}
    .article .body h4{font-size:15px}
    .article .right{justify-content:flex-end}
    .article .right .op{width:34px;height:34px}
  }
</style>
</head>
<body>
<div class="app">

  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">K</div>
      <div>
        <div class="name">KnowFlow</div>
        <div class="tag">个人知识 Copilot</div>
      </div>
    </div>

    <div class="nav-section">
      <div class="label">主导航</div>
      <a class="nav-item" href="chat.html"><span class="icon">💬</span>AI 聊天</a>
      <a class="nav-item" href="import.html"><span class="icon">⬆️</span>导入新内容</a>
      <div class="nav-item active"><span class="icon">📚</span>知识库 <span id="navTotal" class="badge">--</span></div>
    </div>

    <div class="nav-section">
      <div class="label">分类</div>
      <div id="sidebarCategories">
        <div class="nav-item"><span class="icon">📁</span>全部 <span class="badge">--</span></div>
      </div>
    </div>

    <div class="kb-card">
      <div class="row"><span class="k">知识库</span><span id="kbTotal" class="v">-- 篇</span></div>
      <div class="row"><span class="k">分类数</span><span id="kbCategories" class="v">--</span></div>
      <div class="hint">以本地数据库为准</div>
    </div>
  </aside>

  <!-- 主体 -->
  <main class="main">
    <!-- 概览卡 -->
    <div class="stats">
      <div class="stat">
        <div class="label">📚 总收藏</div>
        <div id="totalCount" class="value">0</div>
        <div id="totalTrend" class="trend">来自本地数据库</div>
      </div>
      <div class="stat">
        <div class="label">👁️ 当前展示</div>
        <div id="weekCount" class="value">0</div>
        <div class="trend">随搜索和分类实时变化</div>
      </div>
      <div class="stat">
        <div class="label">🏷️ 分类数</div>
        <div id="categoryCount" class="value">0</div>
        <div id="categoryTrend" class="trend">覆盖 0 篇内容</div>
      </div>
    </div>

    <!-- 搜索 -->
    <div class="toolbar">
      <div class="search">
        <span class="ico">🔍</span>
        <input id="searchInput" placeholder="搜索标题、关键词… 试试「愚园路」或「Agent」" />
        <kbd>⌘ K</kbd>
      </div>
    </div>

    <div class="content">
      <!-- 列表 -->
      <section>
        <div class="list-head">
          <div id="listTitle" class="left">全部内容 <span>0 条</span></div>
        </div>

        <div id="articleList"></div>
      </section>
    </div>
  </main>
</div>
<script src="knowflow-static.js"></script>
<script>
  const articleList = document.querySelector("#articleList");
  const searchInput = document.querySelector("#searchInput");
  const totalCount = document.querySelector("#totalCount");
  const weekCount = document.querySelector("#weekCount");
  const categoryCount = document.querySelector("#categoryCount");
  const categoryTrend = document.querySelector("#categoryTrend");
  const listTitle = document.querySelector("#listTitle");
  const navTotal = document.querySelector("#navTotal");
  const kbTotal = document.querySelector("#kbTotal");
  const kbCategories = document.querySelector("#kbCategories");
  const sidebarCategories = document.querySelector("#sidebarCategories");
  let allNotes = [];
  let selectedCategory = new URLSearchParams(location.search).get("category") || "";

  function escapeHTML(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function categoryIcon(category) {
    const map = {"美食": "🍜", "旅行": "✈️", "旅游": "✈️", "学习": "📖", "护肤": "💄", "家居": "🏠", "未分类": "📄"};
    return map[category] || "📄";
  }

  function renderStats(notes, visibleNotes) {
    const categories = new Set(notes.map((note) => note.category || "未分类"));
    totalCount.textContent = notes.length;
    weekCount.textContent = visibleNotes.length;
    categoryCount.textContent = categories.size;
    navTotal.textContent = notes.length;
    kbTotal.textContent = `${notes.length} 篇`;
    kbCategories.textContent = categories.size;
    categoryTrend.textContent = `覆盖 ${notes.length} 篇内容`;
  }

  function renderCategories(notes) {
    const counts = notes.reduce((acc, note) => {
      const category = note.category || "未分类";
      acc[category] = (acc[category] || 0) + 1;
      return acc;
    }, {});
    sidebarCategories.innerHTML = [
      `<div class="nav-item ${selectedCategory === "" ? "active" : ""}" data-category=""><span class="icon">📁</span>全部 <span class="badge">${notes.length}</span></div>`,
      ...Object.entries(counts).map(([category, count]) => `
        <div class="nav-item ${selectedCategory === category ? "active" : ""}" data-category="${escapeHTML(category)}"><span class="icon">${categoryIcon(category)}</span>${escapeHTML(category)} <span class="badge">${count}</span></div>
      `)
    ].join("");
    sidebarCategories.querySelectorAll(".nav-item").forEach((item) => {
      item.addEventListener("click", () => {
        selectedCategory = item.dataset.category || "";
        const url = selectedCategory ? `library.html?category=${encodeURIComponent(selectedCategory)}` : "library.html";
        history.replaceState(null, "", url);
        render();
      });
    });
  }

  function filteredNotes() {
    const keyword = searchInput.value.trim().toLowerCase();
    return allNotes.filter((note) => {
      const inCategory = !selectedCategory || note.category === selectedCategory;
      const haystack = `${note.title} ${note.summary} ${note.category}`.toLowerCase();
      const inKeyword = !keyword || haystack.includes(keyword);
      return inCategory && inKeyword;
    });
  }

  function renderArticles(notes) {
    const keyword = searchInput.value.trim();
    const title = selectedCategory || "全部内容";
    listTitle.innerHTML = `${title} <span>${notes.length} 条${keyword ? ` · 搜索「${escapeHTML(keyword)}」` : ""}</span>`;
    if (notes.length === 0) {
      articleList.innerHTML = `
        <div class="article">
          <div class="body">
            <h4>还没有找到内容</h4>
            <div class="excerpt">可以先去导入页添加一篇笔记，或者换个关键词搜索。</div>
            <div class="tags"><span class="t strong">空状态</span></div>
          </div>
        </div>
      `;
      return;
    }
    articleList.innerHTML = notes.map((note) => `
      <div class="article" data-note-id="${note.id}" onclick="window.location.href='detail.html?note_id=${note.id}'">
        <div class="body">
          <h4>${escapeHTML(note.title)}</h4>
          <div class="excerpt">${escapeHTML(note.summary || "暂无摘要")}</div>
          <div class="meta">
            <span class="src">📝 本地导入</span>
            <span>${escapeHTML(new Date(note.created_at).toLocaleString("zh-CN"))}</span>
            <span class="dot"></span>
            <span>${note.chunk_count || 0} 个片段</span>
          </div>
          <div class="tags">
            <span class="t strong">${categoryIcon(note.category)} ${escapeHTML(note.category || "未分类")}</span>
          </div>
        </div>
        <div class="right">
          <div class="op" title="查看">→</div>
          <div class="op delete-note" title="删除" onclick="deleteNote(event, ${note.id})">🗑️</div>
        </div>
      </div>
    `).join("");
  }

  async function deleteNote(event, noteId) {
    event.stopPropagation();
    const article = document.querySelector(`.article[data-note-id="${noteId}"]`);
    if (article) article.style.opacity = ".55";
    try {
      if (!KnowFlowStore.deleteNote(noteId)) throw new Error("删除失败");
      allNotes = allNotes.filter((note) => note.id !== noteId);
      render();
    } catch (error) {
      if (article) article.style.opacity = "1";
      alert(error.message || "删除失败，请稍后再试");
    }
  }

  function render() {
    const notes = filteredNotes();
    renderStats(allNotes, notes);
    renderCategories(allNotes);
    renderArticles(notes);
  }

  async function loadNotes() {
    articleList.innerHTML = `<div class="article"><div class="body"><h4>正在读取本地知识库...</h4><div class="excerpt">稍等一下。</div></div></div>`;
    try {
      allNotes = KnowFlowStore.listNotes();
      render();
    } catch (error) {
      articleList.innerHTML = `<div class="article"><div class="body"><h4>读取失败</h4><div class="excerpt">${escapeHTML(error.message || "请确认后端服务已启动")}</div></div></div>`;
    }
  }

  searchInput.addEventListener("input", render);
  searchInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      event.preventDefault();
      render();
      searchInput.blur();
    }
  });
  window.addEventListener("keydown", (event) => {
    if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k") {
      event.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
  });
  window.deleteNote = deleteNote;
  loadNotes();
</script>
</body>
</html>
